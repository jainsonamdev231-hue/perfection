<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="theme-color" content="#0a0a0f">
    
    <title>NEXUS: RAGE ENGINE (Ultimate Edition)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="fx-canvas" aria-hidden="true"></canvas>

    <div id="boot-screen" class="overlay-layer active">
        <div class="glass-terminal">
            <h1 class="system-title">SYSTEM ONLINE</h1>
            <p class="system-logs">Loading audio drivers...</p>
            <p class="system-logs">Calibrating physics engine...</p>
            <button class="hyper-btn" id="btn-engage">ENGAGE OVERRIDE</button>
        </div>
    </div>

    <main class="combat-arena">
        
        <section class="player-sector p2-sector" id="sector-p2">
            
            <header class="sector-hud">
                <div class="combo-tracker" id="p2-combo-text">COMBO MULTIPLIER: 0.0x</div>
                <div class="health-armor-layer">
                    <div class="health-fluid p2-fluid" id="p2-health-fill"></div>
                </div>
            </header>

            <nav class="weapon-array">
                <button class="attack-input" data-player="2" data-move="rock" aria-label="Rock">✊</button>
                <button class="attack-input" data-player="2" data-move="paper" aria-label="Paper">✋</button>
                <button class="attack-input" data-player="2" data-move="scissors" aria-label="Scissors">✌️</button>
            </nav>

            <footer class="system-status" id="p2-status-display">AWAITING NEURAL LINK</footer>
        </section>

        <div class="impact-horizon">
            <div id="global-announcer">VS</div>
        </div>

        <section class="player-sector p1-sector" id="sector-p1">
            
            <header class="system-status" id="p1-status-display">AWAITING NEURAL LINK</header>

            <nav class="weapon-array">
                <button class="attack-input" data-player="1" data-move="rock" aria-label="Rock">✊</button>
                <button class="attack-input" data-player="1" data-move="paper" aria-label="Paper">✋</button>
                <button class="attack-input" data-player="1" data-move="scissors" aria-label="Scissors">✌️</button>
            </nav>

            <footer class="sector-hud">
                <div class="health-armor-layer">
                    <div class="health-fluid p1-fluid" id="p1-health-fill"></div>
                </div>
                <div class="combo-tracker" id="p1-combo-text">COMBO MULTIPLIER: 0.0x</div>
            </footer>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
