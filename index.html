<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS: COMPLETE EDITION</title>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="hit-sound">
        <source src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" type="audio/mpeg">
    </audio>

    <div class="overlay"></div>

    <div id="scr-login" class="screen active">
        <div class="glass-card">
            <h2 class="theme-text">SYSTEM LOGIN</h2>
            <input type="text" id="username" placeholder="FIGHTER NAME" autocomplete="off">
            <button class="action-btn" onclick="Game.login()">AWAKEN</button>
        </div>
    </div>

    <div id="scr-menu" class="screen">
        <div class="glass-card">
            <h3 id="user-display" class="theme-text">---</h3>
            <button class="action-btn" onclick="Game.startMode('OFFLINE')">🕹️ VS CPU</button>
            <button class="action-btn" onclick="Game.startMode('LOCAL')">⚔️ 1V1 LOCAL</button>
            <button class="action-btn" onclick="Game.showOnline()">🌍 ONLINE BATTLE</button>
        </div>
    </div>

    <div id="scr-online" class="screen">
        <div class="glass-card">
            <p>YOUR BATTLE ID:<br><b id="my-word-id" class="theme-text">---</b></p>
            <input type="text" id="target-id" placeholder="ENTER OPPONENT ID">
            <button class="action-btn" onclick="Game.connect()">ESTABLISH LINK</button>
            <button class="action-btn" onclick="Game.switch('scr-menu')">BACK</button>
        </div>
    </div>

    <div id="scr-game" class="screen">
        
        <div class="player-zone p2-zone" id="p2-zone">
            <div class="hp-container"><div class="hp-bar" id="p2-hp"></div></div>
            <div class="moves" id="p2-btns">
                <button class="m-btn" onclick="Game.input(2,'rock')">✊</button>
                <button class="m-btn" onclick="Game.input(2,'paper')">✋</button>
                <button class="m-btn" onclick="Game.input(2,'scissors')">✌️</button>
            </div>
            <div id="p2-status" class="status-text">WAITING...</div>
        </div>

        <div class="divider">
            <div id="result-msg">VS</div>
        </div>

        <div class="player-zone p1-zone" id="p1-zone">
            <div id="p1-status" class="status-text">WAITING...</div>
            <div class="moves" id="p1-btns">
                <button class="m-btn" onclick="Game.input(1,'rock')">✊</button>
                <button class="m-btn" onclick="Game.input(1,'paper')">✋</button>
                <button class="m-btn" onclick="Game.input(1,'scissors')">✌️</button>
            </div>
            <div class="hp-container"><div class="hp-bar" id="p1-hp"></div></div>
        </div>
        
        <button class="reload-btn" onclick="location.reload()">✖</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
